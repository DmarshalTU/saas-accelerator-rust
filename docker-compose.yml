# SaaS Accelerator Rust – Docker Compose  (local development)
# ──────────────────────────────────────────────────────────────
# Two sites mirror production layout:
#   Admin:    http://localhost:3000  (publisher portal + UI)
#   Customer: http://localhost:3001  (landing page + customer portal + webhook)
#
# Quick start:
#   docker compose up -d          # first run — builds images + runs migrations
#   docker compose up -d --build  # rebuild after code changes
#
# Env overrides (create a .env file or export variables):
#   DATABASE_URL, POSTGRES_USER/PASSWORD/DB, SaaS_API_*, AZURE_AD_*, etc.
# ──────────────────────────────────────────────────────────────
# NOTE: AZURE_AD_AUTH is intentionally NOT set here.
# Local dev uses direct DATABASE_URL (password auth). Admin routes are
# unprotected for development ease. Set AZURE_AD_* vars to enable AD login.

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: saas-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saas}
      POSTGRES_DB:       ${POSTGRES_DB:-saas_accelerator}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saas} -d ${POSTGRES_DB:-saas_accelerator}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── DB migrations ───────────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: deployment/Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD:-saas}@postgres:5432/${POSTGRES_DB:-saas_accelerator}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Admin site ──────────────────────────────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: deployment/Dockerfile.admin-site
      args:
        VITE_ADMIN_API_URL: ""     # same-origin; nginx proxies /api → admin-api
        VITE_CUSTOMER_API_URL: ""  # update if customer site is on a different host
    container_name: saas-admin
    ports:
      - "3000:80"
    environment:
      # ── Database (direct URL for local dev — no KV or AAD auth needed)
      DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD:-saas}@postgres:5432/${POSTGRES_DB:-saas_accelerator}
      # ── Marketplace API (leave empty to run without real marketplace calls)
      SaaS_API_TENANT_ID:    ${SaaS_API_TENANT_ID:-}
      SaaS_API_CLIENT_ID:    ${SaaS_API_CLIENT_ID:-}
      SaaS_API_CLIENT_SECRET: ${SaaS_API_CLIENT_SECRET:-}
      # ── Azure AD login (optional for local dev)
      AZURE_AD_TENANT_ID:            ${AZURE_AD_TENANT_ID:-}
      AZURE_AD_CLIENT_ID:            ${AZURE_AD_CLIENT_ID:-}
      AZURE_AD_CLIENT_SECRET:        ${AZURE_AD_CLIENT_SECRET:-}
      AZURE_AD_REDIRECT_URI:         ${AZURE_AD_REDIRECT_URI:-http://localhost:3000/auth/callback}
      AZURE_AD_SIGNED_OUT_REDIRECT_URI: ${AZURE_AD_SIGNED_OUT_REDIRECT_URI:-http://localhost:3000/admin}
      # ── Runtime
      PORT:                 3000
      WEBSITES_PORT:        80
      RUST_LOG:             ${RUST_LOG:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      migrate:
        condition: service_completed_successfully

  # ── Customer site ───────────────────────────────────────────────────────────
  customer:
    build:
      context: .
      dockerfile: deployment/Dockerfile.customer-site
      args:
        VITE_ADMIN_API_URL: ""
        VITE_CUSTOMER_API_URL: ""
    container_name: saas-customer
    ports:
      - "3001:80"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-saas}:${POSTGRES_PASSWORD:-saas}@postgres:5432/${POSTGRES_DB:-saas_accelerator}
      SaaS_API_TENANT_ID:    ${SaaS_API_TENANT_ID:-}
      SaaS_API_CLIENT_ID:    ${SaaS_API_CLIENT_ID:-}
      SaaS_API_CLIENT_SECRET: ${SaaS_API_CLIENT_SECRET:-}
      PORT:                 3001
      WEBSITES_PORT:        80
      RUST_LOG:             ${RUST_LOG:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3001,http://localhost:5173}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
