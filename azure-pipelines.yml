# =============================================================================
# SaaS Accelerator – Rust Edition  |  Azure Pipelines CI/CD
#
# Stages:
#   CI  – Every push/PR: Rust (build + test + clippy) + Frontend (audit + build)
#   CD  – main/master only: Docker build → push to ACR → deploy containers
#
# Required pipeline variables (Pipelines → Edit → Variables):
#   DockerRegistryServiceConnection  – Docker Registry service connection (ACR)
#   ContainerRegistryHost            – ACR login server, e.g. myregistry.azurecr.io
#   AzureServiceConnection           – ARM service connection
#   AdminWebAppName                  – Admin Azure Web App name
#   CustomerWebAppName               – Customer Azure Web App name
#   VITE_ADMIN_API_URL               – e.g. https://<admin-app>.azurewebsites.net
#   VITE_CUSTOMER_API_URL            – e.g. https://<customer-app>.azurewebsites.net
# =============================================================================

trigger:
  branches:
    include: [main, master]
  paths:
    exclude: ['*.md', 'docs/**']

pr:
  branches:
    include: [main, master]
  paths:
    exclude: ['*.md', 'docs/**']

variables:
  RUST_BACKTRACE: '1'
  DOCKER_BUILDKIT: '1'
  VITE_ADMIN_API_URL: $(VITE_ADMIN_API_URL)
  VITE_CUSTOMER_API_URL: $(VITE_CUSTOMER_API_URL)

pool:
  vmImage: 'ubuntu-latest'

# =============================================================================
stages:
  - stage: CI
    displayName: 'CI – build, test, lint'
    jobs:

      # ── Rust ──────────────────────────────────────────────────────────────────
      - job: Rust
        displayName: 'Rust – build / test / clippy'
        steps:
          - script: |
              set -e
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y --default-toolchain stable --profile minimal
              echo "##vso[task.prependpath]$HOME/.cargo/bin"
              rustc --version && cargo --version
            displayName: 'Install Rust (stable)'

          # Cache: ~/.cargo/registry + target dir (keyed on Cargo.lock hash)
          - task: Cache@2
            displayName: 'Cache Cargo registry'
            inputs:
              key: 'cargo-registry | $(Agent.OS) | **/Cargo.lock'
              path: '$(HOME)/.cargo/registry'
              restoreKeys: 'cargo-registry | $(Agent.OS)'

          - task: Cache@2
            displayName: 'Cache Cargo build'
            inputs:
              key: 'cargo-target | $(Agent.OS) | **/Cargo.lock'
              path: '$(Build.SourcesDirectory)/target'
              restoreKeys: 'cargo-target | $(Agent.OS)'

          - script: cargo build --workspace --release
            displayName: 'cargo build'

          - script: cargo test --workspace --no-fail-fast
            displayName: 'cargo test'

          - script: cargo clippy --workspace --all-targets -- -D warnings
            displayName: 'cargo clippy'

      # ── Frontend ──────────────────────────────────────────────────────────────
      - job: Frontend
        displayName: 'Frontend – audit / build'
        dependsOn: []
        steps:
          - task: NodeTool@0
            displayName: 'Use Node.js 20'
            inputs:
              versionSpec: '20.x'

          - task: Cache@2
            displayName: 'Cache node_modules'
            inputs:
              key: 'npm | $(Agent.OS) | frontend/package-lock.json'
              path: 'frontend/node_modules'
              restoreKeys: 'npm | $(Agent.OS)'

          - script: cd frontend && npm ci
            displayName: 'npm ci'

          # Fail the pipeline on HIGH or CRITICAL vulnerabilities
          - script: cd frontend && npm audit --audit-level=high
            displayName: 'npm audit (high/critical = fail)'

          - script: |
              cd frontend
              npm run build
            displayName: 'npm run build'
            env:
              VITE_ADMIN_API_URL: $(VITE_ADMIN_API_URL)
              VITE_CUSTOMER_API_URL: $(VITE_CUSTOMER_API_URL)

  # ===========================================================================
  - stage: Deploy
    displayName: 'CD – Docker → ACR → Web Apps'
    dependsOn: CI
    condition: and(succeeded(), in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/master'))
    jobs:

      # ── Admin site ────────────────────────────────────────────────────────────
      - deployment: DeployAdmin
        displayName: 'Deploy Admin site'
        environment: 'production-admin'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: Docker@2
                  displayName: 'Build and push admin-site'
                  inputs:
                    command: buildAndPush
                    containerRegistry: $(DockerRegistryServiceConnection)
                    repository: 'admin-site'
                    dockerfile: 'deployment/Dockerfile.admin-site'
                    buildContext: '.'
                    tags: |
                      $(Build.BuildId)
                      latest
                    # Pass frontend API URLs as Docker build args
                    buildArguments: >
                      --build-arg VITE_ADMIN_API_URL=$(VITE_ADMIN_API_URL)
                      --build-arg VITE_CUSTOMER_API_URL=$(VITE_CUSTOMER_API_URL)
                  env:
                    DOCKER_BUILDKIT: '1'

                - task: AzureWebAppContainer@1
                  displayName: 'Deploy admin container to Web App'
                  inputs:
                    azureSubscription: $(AzureServiceConnection)
                    appName: $(AdminWebAppName)
                    containers: '$(ContainerRegistryHost)/admin-site:$(Build.BuildId)'

      # ── Customer site ─────────────────────────────────────────────────────────
      - deployment: DeployCustomer
        displayName: 'Deploy Customer site'
        environment: 'production-customer'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: Docker@2
                  displayName: 'Build and push customer-site'
                  inputs:
                    command: buildAndPush
                    containerRegistry: $(DockerRegistryServiceConnection)
                    repository: 'customer-site'
                    dockerfile: 'deployment/Dockerfile.customer-site'
                    buildContext: '.'
                    tags: |
                      $(Build.BuildId)
                      latest
                    buildArguments: >
                      --build-arg VITE_ADMIN_API_URL=$(VITE_ADMIN_API_URL)
                      --build-arg VITE_CUSTOMER_API_URL=$(VITE_CUSTOMER_API_URL)
                  env:
                    DOCKER_BUILDKIT: '1'

                - task: AzureWebAppContainer@1
                  displayName: 'Deploy customer container to Web App'
                  inputs:
                    azureSubscription: $(AzureServiceConnection)
                    appName: $(CustomerWebAppName)
                    containers: '$(ContainerRegistryHost)/customer-site:$(Build.BuildId)'
